workspace:
  name: "chc-web"
  description: >
    Static-first Next.js 16 web application using the App Router, TypeScript,
    Tailwind CSS v4, shadcn/ui, next-intl, and Prisma v7 preparation.

  tech_stack:
    runtime: "Node.js 22.20.x"
    package_manager: "pnpm 10.20.x"
    framework: "Next.js 16 (App Router)"
    language: "TypeScript 5"
    localization: "next-intl"
    orm: "Prisma v7 (lazy server-only integration)"
    ui:
      - "React 19"
      - "Tailwind CSS 4"
      - "shadcn/ui"
      - "lucide-react"
    lint_and_format:
      - "ESLint 9 flat config"
      - "Prettier (prettier.config.mjs)"
      - ".editorconfig"
    delivery:
      - "Docker standalone image"
      - "Helm chart in deploy/helm"
      - "GitHub Actions workflows"
      - "GitHub Pages for docs only"

  commands:
    dev: "pnpm dev"
    build: "pnpm build"
    lint: "pnpm lint"
    format: "pnpm format"
    format_check: "pnpm format:check"
    prisma_generate: "pnpm prisma:generate"

  layout:
    app_directory: "src/app"
    components_directory: "src/components"
    ui_directory: "src/components/ui"
    shared_lib_directory: "src/lib"
    config_directory: "src/config"
    mock_content_directory: "src/lib/content"
    docs_directory: "docs"
    deployment_directory: "deploy"
    styles:
      - "src/app/globals.css"

  conventions:
    - "Use pnpm only. Do not suggest npm, yarn, or bun."
    - "Use TypeScript for all new files (.ts / .tsx)."
    - "Prefer React Server Components by default; add 'use client' only when strictly necessary."
    - "Use shadcn/ui primitives before introducing new low-level UI components."
    - "Follow atomic design: atoms, molecules, organisms, templates."
    - "Keep static placeholder data in src/lib/content while the site remains backend-free."
    - "Treat Prisma as server-only and lazy so the app remains build-safe without DATABASE_URL."
    - "Keep documentation in docs/."
    - "Use .yaml, never .yml."
    - "Use Conventional Commits."
    - "Run pnpm lint and pnpm build before opening a pull request."

  planning_tips:
    feature_workflow:
      - "Start from the relevant route in src/app and identify the smallest reusable component extraction."
      - "Prefer composition of smaller components over large monolithic pages."
      - "When adding static content, centralize it in src/lib/content or src/config."
      - "Keep server-side data fetching close to the route and pass typed props down."

    bugfix_workflow:
      - "Reproduce the bug and add or adjust a unit test once the test stack is present."
      - "Limit changes to the minimal set of files needed to fix the issue."
      - "Preserve public behavior unless the issue explicitly requires a change."

  context_priority:
    high:
      - "src/app/**"
      - "src/components/**"
      - "src/lib/**"
      - "src/config/**"
      - "eslint.config.*"
      - "prettier.config.*"
      - "AGENTS.md"
    medium:
      - ".github/**"
      - "docs/**"
      - "deploy/**"
      - "tsconfig.*"
    low:
      - ".next/**"
      - "dist/**"
      - "out/**"
      - "node_modules/**"

  notes_for_ai:
    - "Use the current Tailwind v4 token system in src/app/globals.css."
    - "GitHub Pages is for docs publication from docs/, not for the live Next.js app."
    - "The preferred production target is Docker plus K3s Helm deployment."
    - "Prefer readability and explicit types over over-optimization."
